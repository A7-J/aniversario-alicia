<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Alicia 🎉</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  color: #333;
}

.container {
  padding: 20px;
}

button {
  font-size: 22px;
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.hidden {
  display: none;
}

#message {
  font-size: 20px;
  margin-top: 20px;
  min-height: 60px;
}

/* FOTO */
#foto {
  margin-top: 20px;
  width: 220px;
  border-radius: 15px;
  opacity: 0;
  transform: scale(0.8);
  transition: 1s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#foto.show {
  opacity: 1;
  transform: scale(1);
}

/* CONFETE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>

</head>

<body>

<div class="container">
  <h1>🎁 Toque no presente</h1>
  <button onclick="abrirPresente()">Abrir</button>

  <div id="message" class="hidden"></div>

  <!-- FOTO -->
  <img id="foto" src="foto.jpg" class="hidden" alt="Nós dois 💖">
</div>

<canvas id="confetti"></canvas>

<script>
// TEXTO PERSONALIZADO
const texto = "Feliz aniversário, Alicia! 💖\n\nQue seu dia seja incrível e cheio de alegria.\nVocê é muito especial pra mim! 🎉";

// EFEITO DIGITANDO
function escreverTexto(elemento, texto, i = 0) {
  if (i < texto.length) {
    elemento.innerHTML += texto.charAt(i) === "\n" ? "<br>" : texto.charAt(i);
    setTimeout(() => escreverTexto(elemento, texto, i + 1), 40);
  }
}

// AO CLICAR
function abrirPresente() {
  const msg = document.getElementById("message");
  msg.classList.remove("hidden");

  escreverTexto(msg, texto);

  iniciarConfete();

  // Mostrar foto depois de um tempo
  const foto = document.getElementById("foto");
  setTimeout(() => {
    foto.classList.remove("hidden");
    foto.classList.add("show");
  }, 1800);
}

// CONFETE
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetes = [];

function iniciarConfete() {
  for (let i = 0; i < 120; i++) {
    confetes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 6 + 2,
      d: Math.random() * 50
    });
  }
  animarConfete();
}

function animarConfete() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confetes.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,50%)";
    ctx.fill();
  });

  atualizarConfete();
  requestAnimationFrame(animarConfete);
}

function atualizarConfete() {
  confetes.forEach(c => {
    c.y += Math.cos(c.d) + 2;
    c.x += Math.sin(c.d);

    if (c.y > canvas.height) {
      c.y = 0;
      c.x = Math.random() * canvas.width;
    }
  });
}
</script>

</body>
</html>
